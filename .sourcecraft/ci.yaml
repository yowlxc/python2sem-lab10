lint:
  tasks:
    - name: python-lint

      cubes:
        - name: lint
          image: python:3.12

          script:
            - pip install -r requirements.txt
            - pip install ruff
            - ruff check backend
            - ruff check ml

test:
  tasks:
    - name: backend-tests

      cubes:
        - name: pytest
          image: python:3.12

          script:
            - pip install -r requirements.txt
            - pip install pytest
            - pytest backend/tests -v

build:
  tasks:
    - name: build-project

      cubes:
        - name: compile
          image: python:3.12

          script:
            - pip install -r requirements.txt
            - python -m compileall backend
            - python -m compileall ml
