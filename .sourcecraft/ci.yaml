on:
  pull_request:
    - workflows: [lint, test, build]
      filter:
        source_branches: ["*"]
        target_branches: ["main", "master"]

  push:
    - workflows: [lint, test, build]
      filter:
        branches: ["main", "master", "develop"]

workflows:

  lint:
    tasks:
      - name: python-lint

        cubes:
          - name: lint
            image: python:3.12

            script:
              - pip install -r requirements.txt
              - pip install ruff
              - ruff check backend
              - ruff check tests
              - ruff check ml

  test:
    tasks:
      - name: backend-tests

        cubes:
          - name: pytest
            image: python:3.12

            script:
              - pip install -r requirements.txt
              - pip install pytest
              - pytest tests -v

  build:
    tasks:
      - name: build-project

        cubes:
          - name: compile
            image: python:3.12

            script:
              - pip install -r requirements.txt
              - python -m compileall backend
              - python -m compileall ml